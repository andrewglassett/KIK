<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIK</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #e0e0e0;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
    }

    h1 {
      font-size: 1.1rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #888;
      margin-bottom: 28px;
    }

    #machine {
      background: #242424;
      border-radius: 12px;
      padding: 28px 32px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      max-width: 1100px;
      width: 100%;
    }

    /* Transport */
    #transport {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 28px;
    }

    #play-btn {
      width: 48px; height: 48px;
      border-radius: 50%;
      border: none;
      background: #3a9e6e;
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      transition: background 0.15s;
      display: flex; align-items: center; justify-content: center;
    }
    #play-btn:hover { background: #4abe84; }
    #play-btn.playing { background: #c0392b; }
    #play-btn.playing:hover { background: #e74c3c; }

    .transport-group { display: flex; flex-direction: column; gap: 4px; }
    .transport-group label { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #666; }
    .transport-group input[type=range] { width: 120px; accent-color: #3a9e6e; }
    #bpm-display { font-size: 1.1rem; color: #ddd; min-width: 48px; }

    #clear-btn {
      margin-left: auto;
      padding: 8px 18px;
      border: 1px solid #444; background: transparent; color: #888;
      border-radius: 6px; cursor: pointer; font-family: inherit;
      font-size: 0.75rem; letter-spacing: 0.1em; text-transform: uppercase;
      transition: all 0.15s;
    }
    #clear-btn:hover { border-color: #888; color: #ccc; }

    /* Step grid */
    #grid { display: flex; flex-direction: column; gap: 6px; }

    .track { display: flex; gap: 4px; align-items: center; }

    .track-label {
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      color: #777; text-align: right; padding-right: 10px;
      width: 72px; flex-shrink: 0;
    }

    .step {
      flex: 1;
      aspect-ratio: 1;
      border-radius: 5px; border: none; background: #333;
      cursor: pointer; transition: background 0.08s; position: relative;
    }
    .step:hover { background: #444; }
    .step.on { background: var(--track-color, #3a9e6e); }
    .step.on:hover { filter: brightness(1.2); }
    .step.active { outline: 2px solid rgba(255,255,255,0.35); outline-offset: -2px; }
    .step.active.on { filter: brightness(1.4); }
    .step.active:not(.on) { background: #484848; }

    /* Beat group gap on first step of beats 2, 3, 4 */
    .step:nth-child(6), .step:nth-child(10), .step:nth-child(14) { margin-left: 6px; }

    #step-numbers { display: flex; gap: 4px; margin-bottom: 4px; }
    #step-numbers > :first-child { width: 72px; flex-shrink: 0; }
    .step-num { flex: 1; text-align: center; font-size: 0.6rem; color: #555; }
    .step-num:nth-child(6), .step-num:nth-child(10), .step-num:nth-child(14) { margin-left: 6px; }

    /* Knob */
    .knob-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; }
    .knob-wrap label { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; color: #666; }
    .knob-wrap span { font-size: 0.7rem; color: #aaa; min-width: 52px; text-align: center; }
    .knob {
      width: 44px; height: 44px; border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #555, #222);
      border: 2px solid #444; position: relative; cursor: ns-resize;
      user-select: none;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5), inset 0 1px 1px rgba(255,255,255,0.07);
    }
    .knob::after {
      content: ''; position: absolute; width: 3px; height: 12px;
      background: #3a9e6e; border-radius: 2px;
      left: 50%; transform-origin: bottom center; bottom: 50%;
      transform: translateX(-50%) rotate(0deg);
    }
    .knob:hover { border-color: #666; }

    /* Control panels */
    .ctrl-panel {
      display: flex; align-items: center; gap: 16px;
      background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
      padding: 14px 20px; margin-bottom: 10px; flex-wrap: wrap;
    }

    .section-label {
      font-size: 0.6rem; letter-spacing: 0.2em; text-transform: uppercase;
      writing-mode: vertical-lr; transform: rotate(180deg);
      margin-right: 4px; flex-shrink: 0;
    }

    /* Kick selector toggle */
    .kick-select { display: flex; gap: 4px; }
    .kick-select-btn {
      padding: 5px 11px;
      border: 1px solid #444; background: transparent; color: #666;
      border-radius: 4px; cursor: pointer; font-family: inherit;
      font-size: 0.68rem; letter-spacing: 0.08em; text-transform: uppercase;
      transition: all 0.12s;
    }
    #kick-toggle-1.active { background: #e74c3c; border-color: #e74c3c; color: #fff; }
    #kick-toggle-2.active { background: #e67e22; border-color: #e67e22; color: #fff; }

    /* FX groups */
    .fx-group { display: flex; flex-direction: column; align-items: center; gap: 8px; }
    .fx-group-label { font-size: 0.55rem; letter-spacing: 0.15em; text-transform: uppercase; color: #555; }
    .fx-group-knobs { display: flex; gap: 14px; }
    .fx-divider { width: 1px; height: 64px; background: #2e2e2e; flex-shrink: 0; }

    /* Filter mode toggle */
    .filter-mode-btn {
      padding: 3px 9px;
      border: 1px solid #444; background: transparent; color: #666;
      border-radius: 4px; cursor: pointer; font-family: inherit;
      font-size: 0.65rem; letter-spacing: 0.1em;
      transition: all 0.12s;
    }
    .filter-mode-btn.lp { border-color: #3a9e6e; color: #3a9e6e; }
    .filter-mode-btn.hp { border-color: #9b59b6; color: #9b59b6; }

    .randomize-btn {
      margin-left: auto; padding: 8px 14px;
      border: 1px solid #555; background: transparent; color: #aaa;
      border-radius: 6px; cursor: pointer; font-family: inherit;
      font-size: 0.7rem; letter-spacing: 0.1em; text-transform: uppercase;
      transition: all 0.15s;
    }
    .randomize-btn:hover { border-color: #e74c3c; color: #e74c3c; }
    .randomize-btn:active { background: rgba(231,76,60,0.1); }

    /* Presets panel */
    #presets-panel {
      display: flex; align-items: center; gap: 10px;
      background: #1e1e1e; border: 1px solid #333; border-radius: 8px;
      padding: 10px 20px; margin-bottom: 10px; flex-wrap: wrap;
    }
    #presets-panel .section-label { color: #888; }
    #preset-name {
      background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 4px;
      color: #ddd; font-family: inherit; font-size: 0.75rem;
      padding: 5px 10px; width: 160px; outline: none;
    }
    #preset-name:focus { border-color: #555; }
    #preset-select {
      background: #2a2a2a; border: 1px solid #3a3a3a; border-radius: 4px;
      color: #ddd; font-family: inherit; font-size: 0.75rem;
      padding: 5px 8px; cursor: pointer; outline: none; min-width: 160px;
    }
    #preset-select:focus { border-color: #555; }
    .preset-btn {
      padding: 5px 12px;
      border: 1px solid #444; background: transparent; color: #aaa;
      border-radius: 4px; cursor: pointer; font-family: inherit;
      font-size: 0.7rem; letter-spacing: 0.08em; text-transform: uppercase;
      transition: all 0.12s;
    }
    .preset-btn:hover { border-color: #888; color: #ccc; }
    #preset-save-btn:hover { border-color: #3a9e6e; color: #3a9e6e; }
    #preset-delete-btn:hover { border-color: #e74c3c; color: #e74c3c; }
    .preset-divider { width: 1px; height: 28px; background: #2e2e2e; flex-shrink: 0; }

    /* Oscilloscope */
    #waveform-wrap {
      margin: 12px 0 16px; border-radius: 6px; overflow: hidden;
      background: #0e0e0e; border: 1px solid #2a2a2a;
    }
    #waveform-canvas { display: block; }

    /* Compressor canvas */
    #comp-canvas { border-radius: 4px; border: 1px solid #2a2a2a; flex-shrink: 0; }
  </style>
</head>
<body>
  <h1>KIK</h1>
  <div id="machine">
    <div id="transport">
      <button id="play-btn">&#9654;</button>
      <div class="transport-group">
        <label>BPM</label>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="range" id="bpm-slider" min="60" max="200" value="120">
          <span id="bpm-display">120</span>
        </div>
      </div>
      <div class="knob-wrap">
        <label>Filter</label>
        <div class="knob" id="filter-knob"></div>
        <span id="filter-display">20kHz</span>
      </div>
      <button id="clear-btn">Clear</button>
    </div>

    <!-- Bass drum synth -->
    <div class="ctrl-panel" id="kick-controls">
      <div class="section-label" style="color:#e74c3c">Bass Drum</div>
      <div class="kick-select">
        <button class="kick-select-btn active" id="kick-toggle-1">K1</button>
        <button class="kick-select-btn" id="kick-toggle-2">K2</button>
      </div>
      <div class="knob-wrap">
        <label>Attack</label>
        <div class="knob" id="kick-attack-knob"></div>
        <span id="kick-attack-display">1ms</span>
      </div>
      <div class="knob-wrap">
        <label>Sustain</label>
        <div class="knob" id="kick-sustain-knob"></div>
        <span id="kick-sustain-display">100%</span>
      </div>
      <div class="knob-wrap">
        <label>Release</label>
        <div class="knob" id="kick-release-knob"></div>
        <span id="kick-release-display">1.2s</span>
      </div>
      <div class="knob-wrap">
        <label>Pitch</label>
        <div class="knob" id="kick-pitch-knob"></div>
        <span id="kick-pitch-display">160Hz</span>
      </div>
      <div class="knob-wrap">
        <label>Wave</label>
        <div class="knob" id="kick-wave-knob"></div>
        <span id="kick-wave-display">Sine</span>
      </div>
      <div class="knob-wrap">
        <label>Bend</label>
        <div class="knob" id="kick-bend-knob"></div>
        <span id="kick-bend-display">70%</span>
      </div>
      <div class="knob-wrap">
        <label>Bend Time</label>
        <div class="knob" id="kick-bendtime-knob"></div>
        <span id="kick-bendtime-display">80ms</span>
      </div>
      <div class="knob-wrap">
        <label>Click</label>
        <div class="knob" id="kick-click-knob"></div>
        <span id="kick-click-display">60%</span>
      </div>
      <div class="fx-divider"></div>

      <div class="fx-group">
        <div class="fx-group-label">Filter</div>
        <div style="display:flex;flex-direction:column;align-items:center;gap:6px">
          <div class="knob-wrap">
            <label>Cutoff</label>
            <div class="knob" id="kick-filter-knob"></div>
            <span id="kick-filter-display">20kHz</span>
          </div>
          <button class="filter-mode-btn lp" id="kick-filter-mode-btn">LP</button>
        </div>
      </div>

      <div class="fx-group">
        <div class="fx-group-label">Volume</div>
        <div class="knob-wrap">
          <label>Level</label>
          <div class="knob" id="kick-vol-knob"></div>
          <span id="kick-vol-display">80%</span>
        </div>
      </div>

      <button class="randomize-btn" id="kick-randomize-btn">&#9684; Randomize</button>
    </div>

    <!-- Bass drum FX -->
    <div class="ctrl-panel" id="kick-fx-controls">
      <div class="section-label" style="color:#e67e22">Bass FX</div>

      <div class="fx-group">
        <div class="fx-group-label">Drive</div>
        <div class="fx-group-knobs">
          <div class="knob-wrap">
            <label>Amount</label>
            <div class="knob" id="kick-drive-knob"></div>
            <span id="kick-drive-display">Off</span>
          </div>
        </div>
      </div>

      <div class="fx-divider"></div>

      <div class="fx-group">
        <div class="fx-group-label">Delay</div>
        <div class="fx-group-knobs">
          <div class="knob-wrap">
            <label>Time</label>
            <div class="knob" id="kick-delaytime-knob"></div>
            <span id="kick-delaytime-display">300ms</span>
          </div>
          <div class="knob-wrap">
            <label>Mix</label>
            <div class="knob" id="kick-delaymix-knob"></div>
            <span id="kick-delaymix-display">0%</span>
          </div>
        </div>
      </div>

      <div class="fx-divider"></div>

      <div class="fx-group">
        <div class="fx-group-label">Reverb</div>
        <div class="fx-group-knobs">
          <div class="knob-wrap">
            <label>Size</label>
            <div class="knob" id="kick-reverbsize-knob"></div>
            <span id="kick-reverbsize-display">1.6s</span>
          </div>
          <div class="knob-wrap">
            <label>Grains</label>
            <div class="knob" id="kick-reverbgrains-knob"></div>
            <span id="kick-reverbgrains-display">1010</span>
          </div>
          <div class="knob-wrap">
            <label>Mix</label>
            <div class="knob" id="kick-reverbmix-knob"></div>
            <span id="kick-reverbmix-display">0%</span>
          </div>
        </div>
      </div>

      <div class="fx-divider"></div>

      <div class="fx-group">
        <div class="fx-group-label">Bit Crush</div>
        <div class="fx-group-knobs">
          <div class="knob-wrap">
            <label>Reduce</label>
            <div class="knob" id="kick-bits-knob"></div>
            <span id="kick-bits-display">16 bit</span>
          </div>
        </div>
      </div>

      <div class="fx-divider"></div>

      <div class="fx-group" style="align-items:flex-start">
        <div class="fx-group-label">Compressor</div>
        <div style="display:flex;gap:16px;align-items:flex-start">
          <div class="fx-group-knobs">
            <div class="knob-wrap">
              <label>Thresh</label>
              <div class="knob" id="kick-comp-thresh-knob"></div>
              <span id="kick-comp-thresh-display">-14 dB</span>
            </div>
            <div class="knob-wrap">
              <label>Ratio</label>
              <div class="knob" id="kick-comp-ratio-knob"></div>
              <span id="kick-comp-ratio-display">7:1</span>
            </div>
            <div class="knob-wrap">
              <label>Attack</label>
              <div class="knob" id="kick-comp-attack-knob"></div>
              <span id="kick-comp-attack-display">1.0ms</span>
            </div>
            <div class="knob-wrap">
              <label>Release</label>
              <div class="knob" id="kick-comp-release-knob"></div>
              <span id="kick-comp-release-display">120ms</span>
            </div>
            <div class="knob-wrap">
              <label>Knee</label>
              <div class="knob" id="kick-comp-knee-knob"></div>
              <span id="kick-comp-knee-display">4 dB</span>
            </div>
            <div class="knob-wrap">
              <label>Makeup</label>
              <div class="knob" id="kick-comp-makeup-knob"></div>
              <span id="kick-comp-makeup-display">+0 dB</span>
            </div>
          </div>
          <canvas id="comp-canvas" width="170" height="110"></canvas>
        </div>
      </div>
    </div>

    <!-- Presets -->
    <div id="presets-panel">
      <div class="section-label">Presets</div>
      <input type="text" id="preset-name" placeholder="Preset name…" maxlength="40">
      <button class="preset-btn" id="preset-save-btn">Save</button>
      <div class="preset-divider"></div>
      <select id="preset-select"><option value="">— saved presets —</option></select>
      <button class="preset-btn" id="preset-load-btn">Load</button>
      <button class="preset-btn" id="preset-delete-btn">Delete</button>
    </div>

    <!-- Oscilloscope -->
    <div id="waveform-wrap">
      <canvas id="waveform-canvas"></canvas>
    </div>

    <div id="step-numbers"><div></div></div>
    <div id="grid"></div>
  </div>

  <script>
    const TRACKS = [
      { name: 'Kik 1', color: '#e74c3c', sound: 'kick' },
      { name: 'Kik 2', color: '#e67e22', sound: 'kick' },
    ];
    const NUM_STEPS = 16;

    // --- Sequencer state ---
    let bpm = 120, playing = false, currentStep = -1;
    let schedulerTimer = null, nextStepTime = 0, stepQueue = [];
    const pattern = TRACKS.map(() => Array(NUM_STEPS).fill(false));

    // --- Per-kick state (all values are normalised 0–1 knob positions) ---
    function defaultKickState() {
      return {
        attack: 0, sustain: 1, release: 0.46, pitch: 0.69,
        wave: 0.5, bend: 0.7, bendTime: 0.12, click: 0.6,
        drive: 0, delayTime: 0.36, delayMix: 0,
        reverbSize: 0.5, reverbGrains: 0.5, reverbMix: 0,
        bits: 0,
        compThresh: 0.65, compRatio: 0.54, compAtk: 0.5,
        compRel: 0.49, compKnee: 0.5, compMakeup: 0,
        filterCutoff: 1, filterMode: 'lowpass', volume: 0.8,
      };
    }
    const kickState    = [defaultKickState(), defaultKickState()];
    const kickFxChains = [null, null];
    let activeKick = 0;

    // --- Audio context ---
    let ctx = null, masterFilter = null, outputAnalyser = null;

    function getCtx() {
      if (!ctx) {
        ctx = new (window.AudioContext || window.webkitAudioContext)();
        masterFilter = ctx.createBiquadFilter();
        masterFilter.type = 'lowpass';
        masterFilter.frequency.value = 20000;
        masterFilter.Q.value = 1.2;
        outputAnalyser = ctx.createAnalyser();
        outputAnalyser.fftSize = 2048;
        outputAnalyser.smoothingTimeConstant = 0.05;
        masterFilter.connect(outputAnalyser);
        outputAnalyser.connect(ctx.destination);
      }
      if (ctx.state === 'suspended') ctx.resume();
      return ctx;
    }
    function getOutput() { getCtx(); return masterFilter; }

    // --- Kick FX helpers ---
    function makeDriveCurve(n) {
      const k = n * 60, sz = 512;
      const curve = new Float32Array(sz);
      for (let i = 0; i < sz; i++) {
        const x = (i * 2 / (sz - 1)) - 1;
        curve[i] = k === 0 ? x : ((1 + k) * x) / (1 + k * Math.abs(x));
      }
      return curve;
    }

    function makeBitCrushCurve(bits) {
      const steps = Math.pow(2, Math.max(1, bits - 1)), sz = 4096;
      const curve = new Float32Array(sz);
      for (let i = 0; i < sz; i++) {
        const x = (i * 2 / (sz - 1)) - 1;
        curve[i] = Math.round(x * steps) / steps;
      }
      return curve;
    }

    function makeReverbIR(c, size, grainsParam) {
      const sr = c.sampleRate;
      const length = 0.1 + size * 2.9;
      const bufLen = Math.ceil(sr * length);
      const numGrains = Math.round(20 + grainsParam * 1980);
      const buf = c.createBuffer(2, bufLen, sr);
      for (let ch = 0; ch < 2; ch++) {
        const d = buf.getChannelData(ch);
        for (let g = 0; g < numGrains; g++) {
          const pos = Math.floor(Math.random() * bufLen);
          const amp = Math.exp(-pos / sr * 4 / length) * (Math.random() * 0.5 + 0.5);
          d[pos] += amp * (Math.random() > 0.5 ? 1 : -1);
        }
      }
      return buf;
    }

    // --- Per-kick FX chain (lazy init) ---
    function getKickFx(idx) {
      if (kickFxChains[idx]) return kickFxChains[idx];
      const c = getCtx();
      const p = kickState[idx];

      // Korg-35 style filter: single 12dB/oct pole, Q≈3.5 for that characteristic resonant colour
      const channelFilter = c.createBiquadFilter();
      channelFilter.type = p.filterMode;
      channelFilter.frequency.value = 20 * Math.pow(1000, p.filterCutoff);
      channelFilter.Q.value = 3.5;

      const channelGain = c.createGain();
      channelGain.gain.value = p.volume;

      const drive    = c.createWaveShaper();
      const bitCrush = c.createWaveShaper();
      const delay    = c.createDelay(2.0);
      const delayFb  = c.createGain();
      const delayDry = c.createGain();
      const delayWet = c.createGain();
      const reverb   = c.createConvolver();
      const reverbDry = c.createGain();
      const reverbWet = c.createGain();
      const comp     = c.createDynamicsCompressor();
      const makeup   = c.createGain();

      drive.oversample   = '4x';
      drive.curve        = makeDriveCurve(p.drive);
      bitCrush.curve     = makeBitCrushCurve(Math.round(16 - p.bits * 15));
      delay.delayTime.value  = 0.03 + p.delayTime * 0.77;
      delayFb.gain.value     = 0.45;
      delayDry.gain.value    = 1 - p.delayMix;
      delayWet.gain.value    = p.delayMix;
      reverb.buffer          = makeReverbIR(c, p.reverbSize, p.reverbGrains);
      reverbDry.gain.value   = 1 - p.reverbMix;
      reverbWet.gain.value   = p.reverbMix;
      comp.threshold.value   = -40 + p.compThresh * 40;
      comp.knee.value        = p.compKnee * 8;
      comp.ratio.value       = 2 * Math.pow(10, p.compRatio);
      comp.attack.value      = 0.0001 * Math.pow(100, p.compAtk);
      comp.release.value     = 0.020 * Math.pow(40, p.compRel);
      makeup.gain.value      = Math.pow(10, (p.compMakeup * 18) / 20);

      channelFilter.connect(drive);
      drive.connect(bitCrush);
      bitCrush.connect(delayDry);
      bitCrush.connect(delay);
      delay.connect(delayFb); delayFb.connect(delay);
      delay.connect(delayWet);
      delayDry.connect(reverbDry); delayDry.connect(reverb);
      delayWet.connect(reverbDry); delayWet.connect(reverb);
      reverb.connect(reverbWet);
      reverbDry.connect(comp); reverbWet.connect(comp);
      comp.connect(makeup); makeup.connect(channelGain); channelGain.connect(getOutput());

      kickFxChains[idx] = { channelFilter, channelGain, drive, bitCrush, delay, delayFb, delayDry, delayWet, reverb, reverbDry, reverbWet, comp, makeup };
      return kickFxChains[idx];
    }

    const reverbTimers = [null, null];
    function scheduleReverbRebuild(idx) {
      clearTimeout(reverbTimers[idx]);
      reverbTimers[idx] = setTimeout(() => {
        const fx = kickFxChains[idx];
        if (fx) {
          const p = kickState[idx];
          fx.reverb.buffer = makeReverbIR(getCtx(), p.reverbSize, p.reverbGrains);
        }
      }, 80);
    }

    // --- Kick wave morphing ---
    function makeKickWave(c, pos) {
      const N = 32;
      const real = new Float32Array(N), imag = new Float32Array(N);
      const tri = new Float32Array(N);
      for (let n = 1; n < N; n += 2) tri[n] = Math.pow(-1, (n - 1) / 2) / (n * n);
      const sqr = new Float32Array(N);
      for (let n = 1; n < N; n += 2) sqr[n] = 1 / n;
      const t = pos <= 0.5 ? pos / 0.5 : (pos - 0.5) / 0.5;
      for (let n = 1; n < N; n++) {
        const a = pos <= 0.5 ? tri[n] : (n === 1 ? 1 : 0);
        const b = pos <= 0.5 ? (n === 1 ? 1 : 0) : sqr[n];
        imag[n] = a * (1 - t) + b * t;
      }
      return c.createPeriodicWave(real, imag, { disableNormalization: false });
    }

    function waveLabel(v) {
      if (v <= 0.03) return 'Tri';
      if (v >= 0.97) return 'Sqr';
      if (Math.abs(v - 0.5) <= 0.03) return 'Sine';
      return Math.round(v * 100) + '%';
    }

    // --- Sound engine ---
    function playSound(trackIndex, when) {
      const c = getCtx();
      if (TRACKS[trackIndex].sound !== 'kick') return;

      const p  = kickState[trackIndex];
      const fx = getKickFx(trackIndex);

      // Compute actual values from normalised positions
      const attack   = 0.001 + p.attack * 0.079;
      const sustain  = 0.05  + p.sustain * 0.95;
      const release  = 0.05  + p.release * 2.45;
      const pitch    = 40 * Math.pow(300 / 40, p.pitch);
      const bendTime = 0.01  + p.bendTime * 0.59;
      const clickAmt = p.click;
      const dur      = attack + release;

      // Main oscillator (body)
      const osc  = c.createOscillator();
      const gain = c.createGain();
      osc.setPeriodicWave(makeKickWave(c, p.wave));
      osc.connect(gain); gain.connect(fx.channelFilter);
      const bendTarget = Math.max(pitch * (1 - p.bend), 0.5);
      osc.frequency.setValueAtTime(pitch, when);
      osc.frequency.exponentialRampToValueAtTime(bendTarget, when + bendTime);
      gain.gain.setValueAtTime(0.0001, when);
      gain.gain.linearRampToValueAtTime(sustain, when + attack);
      gain.gain.exponentialRampToValueAtTime(0.0001, when + dur);
      osc.start(when); osc.stop(when + dur + 0.01);

      // Click transient (needle pulse)
      if (clickAmt > 0.01) {
        const clickLen = Math.ceil(c.sampleRate * 0.06);
        const clickBuf = c.createBuffer(1, clickLen, c.sampleRate);
        const cd = clickBuf.getChannelData(0);
        for (let i = 0; i < clickLen; i++) cd[i] = Math.random() * 2 - 1;
        const click     = c.createBufferSource();
        const clickFilt = c.createBiquadFilter();
        const clickGain = c.createGain();
        click.buffer = clickBuf;
        clickFilt.type = 'bandpass';
        clickFilt.frequency.value = 2200 + clickAmt * 1800;
        clickFilt.Q.value = 0.9;
        click.connect(clickFilt); clickFilt.connect(clickGain); clickGain.connect(fx.channelFilter);
        const clickDur = 0.004 + clickAmt * 0.046;
        clickGain.gain.setValueAtTime(clickAmt * 1.8, when);
        clickGain.gain.exponentialRampToValueAtTime(0.0001, when + clickDur);
        click.start(when); click.stop(when + clickDur + 0.005);
      }
    }

    // --- Scheduler ---
    function scheduleStep(step, when) {
      stepQueue.push({ step, when });
      TRACKS.forEach((_, ti) => { if (pattern[ti][step]) playSound(ti, when); });
    }
    function scheduler() {
      const c = getCtx();
      const spStep = (60 / bpm) / 4;
      while (nextStepTime < c.currentTime + 0.1) {
        const step = (currentStep + 1) % NUM_STEPS;
        scheduleStep(step, nextStepTime);
        currentStep = step;
        nextStepTime += spStep;
      }
      schedulerTimer = setTimeout(scheduler, 25);
    }
    function startScheduler() {
      const c = getCtx();
      currentStep = NUM_STEPS - 1;
      nextStepTime = c.currentTime + 0.05;
      stepQueue = [];
      scheduler();
    }
    function stopScheduler() { clearTimeout(schedulerTimer); schedulerTimer = null; }

    // --- Playhead ---
    let animFrame = null, lastDrawnStep = -1;
    function drawPlayhead() {
      const c = getCtx();
      let visibleStep = -1;
      for (let i = stepQueue.length - 1; i >= 0; i--) {
        if (stepQueue[i].when <= c.currentTime) { visibleStep = stepQueue[i].step; break; }
      }
      while (stepQueue.length > 32) stepQueue.shift();
      if (visibleStep !== lastDrawnStep) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        if (visibleStep >= 0) {
          document.querySelectorAll(`.step[data-step="${visibleStep}"]`).forEach(el => el.classList.add('active'));
        }
        lastDrawnStep = visibleStep;
      }
      if (playing) animFrame = requestAnimationFrame(drawPlayhead);
    }

    // --- Build DOM ---
    const stepNumbersEl = document.getElementById('step-numbers');
    for (let s = 0; s < NUM_STEPS; s++) {
      const d = document.createElement('div');
      d.className = 'step-num'; d.textContent = s + 1;
      stepNumbersEl.appendChild(d);
    }

    const gridEl = document.getElementById('grid');
    TRACKS.forEach((track, ti) => {
      const row = document.createElement('div');
      row.className = 'track';
      const lbl = document.createElement('div');
      lbl.className = 'track-label'; lbl.textContent = track.name;
      row.appendChild(lbl);
      for (let s = 0; s < NUM_STEPS; s++) {
        const btn = document.createElement('button');
        btn.className = 'step';
        btn.dataset.track = ti; btn.dataset.step = s;
        btn.style.setProperty('--track-color', track.color);
        btn.addEventListener('click', () => {
          pattern[ti][s] = !pattern[ti][s];
          btn.classList.toggle('on', pattern[ti][s]);
          if (pattern[ti][s]) playSound(ti, getCtx().currentTime);
          if (autoSaveFn) autoSaveFn();
        });
        row.appendChild(btn);
      }
      gridEl.appendChild(row);
    });

    // Default pattern: kick 1 on downbeats
    [0, 4, 8, 12].forEach(s => {
      pattern[0][s] = true;
      document.querySelector(`.step[data-track="0"][data-step="${s}"]`).classList.add('on');
    });

    // --- Transport ---
    const playBtn = document.getElementById('play-btn');
    playBtn.addEventListener('click', () => {
      playing = !playing;
      if (playing) {
        playBtn.innerHTML = '&#9646;&#9646;'; playBtn.classList.add('playing');
        startScheduler(); animFrame = requestAnimationFrame(drawPlayhead);
      } else {
        playBtn.innerHTML = '&#9654;'; playBtn.classList.remove('playing');
        stopScheduler(); cancelAnimationFrame(animFrame);
        document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
        lastDrawnStep = -1;
      }
    });

    const bpmSlider = document.getElementById('bpm-slider');
    bpmSlider.addEventListener('input', () => {
      bpm = parseInt(bpmSlider.value);
      document.getElementById('bpm-display').textContent = bpm;
      if (autoSaveFn) autoSaveFn();
    });

    document.getElementById('clear-btn').addEventListener('click', () => {
      TRACKS.forEach((_, ti) => pattern[ti].fill(false));
      document.querySelectorAll('.step').forEach(el => el.classList.remove('on'));
      if (autoSaveFn) autoSaveFn();
    });

    // --- Knob factory ---
    const knobStyle = document.createElement('style');
    knobStyle.textContent = `.knob::after { transform: translateX(-50%) rotate(var(--knob-rot, -135deg)); }`;
    document.head.appendChild(knobStyle);

    let activeKnobDrag = null;
    window.addEventListener('mousemove', e => {
      if (!activeKnobDrag) return;
      activeKnobDrag.update(activeKnobDrag.startVal + (activeKnobDrag.startY - e.clientY) / 150);
    });
    window.addEventListener('mouseup', () => { activeKnobDrag = null; });
    window.addEventListener('touchmove', e => {
      if (!activeKnobDrag) return;
      activeKnobDrag.update(activeKnobDrag.startVal + (activeKnobDrag.startY - e.touches[0].clientY) / 150);
    }, { passive: false });
    window.addEventListener('touchend', () => { activeKnobDrag = null; });

    let autoSaveFn = null; // set after persistence layer is ready

    function makeKnob(id, defaultVal, onUpdate) {
      const el = document.getElementById(id);
      let value = defaultVal;
      function set(n) {
        value = Math.max(0, Math.min(1, n));
        el.style.setProperty('--knob-rot', (-135 + value * 270) + 'deg');
        onUpdate(value);
        if (autoSaveFn) autoSaveFn();
      }
      el.addEventListener('mousedown', e => {
        activeKnobDrag = { startY: e.clientY, startVal: value, update: set }; e.preventDefault();
      });
      el.addEventListener('touchstart', e => {
        activeKnobDrag = { startY: e.touches[0].clientY, startVal: value, update: set }; e.preventDefault();
      }, { passive: false });
      el.addEventListener('dblclick', () => set(defaultVal));
      set(defaultVal);
      return { get: () => value, set };
    }

    // --- Per-channel filter (Korg-35 style) and volume ---
    const kickFilterKnob = makeKnob('kick-filter-knob', kickState[0].filterCutoff, n => {
      kickState[activeKick].filterCutoff = n;
      const freq = 20 * Math.pow(1000, n);
      const hz = freq >= 1000 ? (freq / 1000).toFixed(freq >= 10000 ? 0 : 1) + 'kHz' : Math.round(freq) + 'Hz';
      document.getElementById('kick-filter-display').textContent = hz;
      const fx = kickFxChains[activeKick];
      if (fx) fx.channelFilter.frequency.setTargetAtTime(freq, getCtx().currentTime, 0.01);
    });

    document.getElementById('kick-filter-mode-btn').addEventListener('click', () => {
      const mode = kickState[activeKick].filterMode === 'lowpass' ? 'highpass' : 'lowpass';
      kickState[activeKick].filterMode = mode;
      const btn = document.getElementById('kick-filter-mode-btn');
      btn.textContent = mode === 'lowpass' ? 'LP' : 'HP';
      btn.className = 'filter-mode-btn ' + (mode === 'lowpass' ? 'lp' : 'hp');
      const fx = kickFxChains[activeKick];
      if (fx) fx.channelFilter.type = mode;
      if (autoSaveFn) autoSaveFn();
    });

    const kickVolKnob = makeKnob('kick-vol-knob', kickState[0].volume, n => {
      kickState[activeKick].volume = n;
      document.getElementById('kick-vol-display').textContent = Math.round(n * 100) + '%';
      const fx = kickFxChains[activeKick];
      if (fx) fx.channelGain.gain.setTargetAtTime(n, getCtx().currentTime, 0.02);
    });

    // --- Master filter ---
    const filterKnobRef = makeKnob('filter-knob', 0, n => {
      const freq = 20000 * Math.pow(80 / 20000, n);
      const hz = freq >= 1000 ? (freq / 1000).toFixed(freq >= 10000 ? 0 : 1) + 'kHz' : Math.round(freq) + 'Hz';
      document.getElementById('filter-display').textContent = hz;
      if (masterFilter) masterFilter.frequency.setTargetAtTime(freq, getCtx().currentTime, 0.01);
    });

    // --- Kick synth knobs ---
    // Each callback: saves to kickState[activeKick], updates display, updates FX node if chain exists.

    const kickAttackKnob = makeKnob('kick-attack-knob', kickState[0].attack, n => {
      kickState[activeKick].attack = n;
      document.getElementById('kick-attack-display').textContent = Math.round((0.001 + n * 0.079) * 1000) + 'ms';
    });

    const kickSustainKnob = makeKnob('kick-sustain-knob', kickState[0].sustain, n => {
      kickState[activeKick].sustain = n;
      document.getElementById('kick-sustain-display').textContent = Math.round((0.05 + n * 0.95) * 100) + '%';
    });

    const kickReleaseKnob = makeKnob('kick-release-knob', kickState[0].release, n => {
      kickState[activeKick].release = n;
      const r = 0.05 + n * 2.45;
      document.getElementById('kick-release-display').textContent = r < 1 ? Math.round(r * 1000) + 'ms' : r.toFixed(2) + 's';
    });

    const kickPitchKnob = makeKnob('kick-pitch-knob', kickState[0].pitch, n => {
      kickState[activeKick].pitch = n;
      document.getElementById('kick-pitch-display').textContent = Math.round(40 * Math.pow(300 / 40, n)) + 'Hz';
    });

    const kickWaveKnob = makeKnob('kick-wave-knob', kickState[0].wave, n => {
      kickState[activeKick].wave = n;
      document.getElementById('kick-wave-display').textContent = waveLabel(n);
    });

    const kickBendKnob = makeKnob('kick-bend-knob', kickState[0].bend, n => {
      kickState[activeKick].bend = n;
      document.getElementById('kick-bend-display').textContent = Math.round(n * 100) + '%';
    });

    const kickBendTimeKnob = makeKnob('kick-bendtime-knob', kickState[0].bendTime, n => {
      kickState[activeKick].bendTime = n;
      document.getElementById('kick-bendtime-display').textContent = Math.round((0.01 + n * 0.59) * 1000) + 'ms';
    });

    const kickClickKnob = makeKnob('kick-click-knob', kickState[0].click, n => {
      kickState[activeKick].click = n;
      document.getElementById('kick-click-display').textContent = n < 0.02 ? 'Off' : Math.round(n * 100) + '%';
    });

    // --- Kick FX knobs ---
    const kickDriveKnob = makeKnob('kick-drive-knob', kickState[0].drive, n => {
      kickState[activeKick].drive = n;
      document.getElementById('kick-drive-display').textContent = n < 0.02 ? 'Off' : Math.round(n * 100) + '%';
      const fx = kickFxChains[activeKick];
      if (fx) fx.drive.curve = makeDriveCurve(n);
    });

    const kickDelayTimeKnob = makeKnob('kick-delaytime-knob', kickState[0].delayTime, n => {
      kickState[activeKick].delayTime = n;
      const ms = Math.round((0.03 + n * 0.77) * 1000);
      document.getElementById('kick-delaytime-display').textContent = ms + 'ms';
      const fx = kickFxChains[activeKick];
      if (fx) fx.delay.delayTime.setTargetAtTime(0.03 + n * 0.77, getCtx().currentTime, 0.02);
    });

    const kickDelayMixKnob = makeKnob('kick-delaymix-knob', kickState[0].delayMix, n => {
      kickState[activeKick].delayMix = n;
      document.getElementById('kick-delaymix-display').textContent = Math.round(n * 100) + '%';
      const fx = kickFxChains[activeKick];
      if (fx) {
        fx.delayDry.gain.setTargetAtTime(1 - n, getCtx().currentTime, 0.02);
        fx.delayWet.gain.setTargetAtTime(n, getCtx().currentTime, 0.02);
      }
    });

    const kickReverbSizeKnob = makeKnob('kick-reverbsize-knob', kickState[0].reverbSize, n => {
      kickState[activeKick].reverbSize = n;
      document.getElementById('kick-reverbsize-display').textContent = (0.1 + n * 2.9).toFixed(1) + 's';
      scheduleReverbRebuild(activeKick);
    });

    const kickReverbGrainsKnob = makeKnob('kick-reverbgrains-knob', kickState[0].reverbGrains, n => {
      kickState[activeKick].reverbGrains = n;
      document.getElementById('kick-reverbgrains-display').textContent = Math.round(20 + n * 1980);
      scheduleReverbRebuild(activeKick);
    });

    const kickReverbMixKnob = makeKnob('kick-reverbmix-knob', kickState[0].reverbMix, n => {
      kickState[activeKick].reverbMix = n;
      document.getElementById('kick-reverbmix-display').textContent = Math.round(n * 100) + '%';
      const fx = kickFxChains[activeKick];
      if (fx) {
        fx.reverbDry.gain.setTargetAtTime(1 - n, getCtx().currentTime, 0.02);
        fx.reverbWet.gain.setTargetAtTime(n, getCtx().currentTime, 0.02);
      }
    });

    const kickBitsKnob = makeKnob('kick-bits-knob', kickState[0].bits, n => {
      kickState[activeKick].bits = n;
      const bits = Math.round(16 - n * 15);
      document.getElementById('kick-bits-display').textContent = bits + ' bit';
      const fx = kickFxChains[activeKick];
      if (fx) fx.bitCrush.curve = makeBitCrushCurve(bits);
    });

    // --- Compressor knobs ---
    const kickCompThreshKnob = makeKnob('kick-comp-thresh-knob', kickState[0].compThresh, n => {
      kickState[activeKick].compThresh = n;
      const db = -40 + n * 40;
      document.getElementById('kick-comp-thresh-display').textContent = Math.round(db) + ' dB';
      const fx = kickFxChains[activeKick];
      if (fx) fx.comp.threshold.setTargetAtTime(db, getCtx().currentTime, 0.01);
    });

    const kickCompRatioKnob = makeKnob('kick-comp-ratio-knob', kickState[0].compRatio, n => {
      kickState[activeKick].compRatio = n;
      const ratio = 2 * Math.pow(10, n);
      document.getElementById('kick-comp-ratio-display').textContent = ratio.toFixed(1) + ':1';
      const fx = kickFxChains[activeKick];
      if (fx) fx.comp.ratio.setTargetAtTime(ratio, getCtx().currentTime, 0.01);
    });

    const kickCompAttackKnob = makeKnob('kick-comp-attack-knob', kickState[0].compAtk, n => {
      kickState[activeKick].compAtk = n;
      const s = 0.0001 * Math.pow(100, n);
      const ms = s * 1000;
      document.getElementById('kick-comp-attack-display').textContent = (ms < 1 ? ms.toFixed(2) : ms.toFixed(1)) + 'ms';
      const fx = kickFxChains[activeKick];
      if (fx) fx.comp.attack.setTargetAtTime(s, getCtx().currentTime, 0.01);
    });

    const kickCompReleaseKnob = makeKnob('kick-comp-release-knob', kickState[0].compRel, n => {
      kickState[activeKick].compRel = n;
      const s = 0.020 * Math.pow(40, n);
      const ms = s * 1000;
      document.getElementById('kick-comp-release-display').textContent = ms < 1000 ? Math.round(ms) + 'ms' : s.toFixed(2) + 's';
      const fx = kickFxChains[activeKick];
      if (fx) fx.comp.release.setTargetAtTime(s, getCtx().currentTime, 0.01);
    });

    const kickCompKneeKnob = makeKnob('kick-comp-knee-knob', kickState[0].compKnee, n => {
      kickState[activeKick].compKnee = n;
      const db = n * 8;
      document.getElementById('kick-comp-knee-display').textContent = db.toFixed(1) + ' dB';
      const fx = kickFxChains[activeKick];
      if (fx) fx.comp.knee.setTargetAtTime(db, getCtx().currentTime, 0.01);
    });

    const kickCompMakeupKnob = makeKnob('kick-comp-makeup-knob', kickState[0].compMakeup, n => {
      kickState[activeKick].compMakeup = n;
      const db = n * 18;
      document.getElementById('kick-comp-makeup-display').textContent = '+' + Math.round(db) + ' dB';
      const fx = kickFxChains[activeKick];
      if (fx) fx.makeup.gain.setTargetAtTime(Math.pow(10, db / 20), getCtx().currentTime, 0.02);
    });

    // --- Kick toggle ---
    const allKickKnobs = [
      [kickAttackKnob,    'attack'],    [kickSustainKnob,      'sustain'],
      [kickReleaseKnob,   'release'],   [kickPitchKnob,        'pitch'],
      [kickWaveKnob,      'wave'],      [kickBendKnob,         'bend'],
      [kickBendTimeKnob,  'bendTime'],  [kickClickKnob,        'click'],
      [kickDriveKnob,     'drive'],     [kickDelayTimeKnob,    'delayTime'],
      [kickDelayMixKnob,  'delayMix'],  [kickReverbSizeKnob,   'reverbSize'],
      [kickReverbGrainsKnob,'reverbGrains'],[kickReverbMixKnob,'reverbMix'],
      [kickBitsKnob,      'bits'],      [kickCompThreshKnob,   'compThresh'],
      [kickCompRatioKnob, 'compRatio'], [kickCompAttackKnob,   'compAtk'],
      [kickCompReleaseKnob,'compRel'],  [kickCompKneeKnob,     'compKnee'],
      [kickCompMakeupKnob,'compMakeup'],
      [kickFilterKnob,    'filterCutoff'],
      [kickVolKnob,       'volume'],
    ];

    function switchToKick(idx) {
      activeKick = idx;
      document.getElementById('kick-toggle-1').classList.toggle('active', idx === 0);
      document.getElementById('kick-toggle-2').classList.toggle('active', idx === 1);
      const s = kickState[idx];
      allKickKnobs.forEach(([knob, key]) => knob.set(s[key]));
      const mode = s.filterMode || 'lowpass';
      const btn = document.getElementById('kick-filter-mode-btn');
      btn.textContent = mode === 'lowpass' ? 'LP' : 'HP';
      btn.className = 'filter-mode-btn ' + (mode === 'lowpass' ? 'lp' : 'hp');
    }

    document.getElementById('kick-toggle-1').addEventListener('click', () => switchToKick(0));
    document.getElementById('kick-toggle-2').addEventListener('click', () => switchToKick(1));

    // --- Randomizer ---
    document.getElementById('kick-randomize-btn').addEventListener('click', () => {
      allKickKnobs.forEach(([knob]) => knob.set(Math.random()));
      playSound(activeKick, getCtx().currentTime);
    });

    // --- Persistence ---
    const AUTO_SAVE_KEY = 'drumMachine_autosave';
    const PRESETS_KEY   = 'drumMachine_presets';

    function captureState() {
      return {
        kickState: kickState.map(s => ({ ...s })),
        pattern:   pattern.map(row => [...row]),
        bpm,
        filterKnobVal: filterKnobRef.get(),
        activeKick,
      };
    }

    function applyState(snap) {
      // BPM
      bpm = snap.bpm ?? 120;
      document.getElementById('bpm-slider').value = bpm;
      document.getElementById('bpm-display').textContent = bpm;

      // Pattern
      TRACKS.forEach((_, ti) => {
        pattern[ti].fill(false);
        document.querySelectorAll(`.step[data-track="${ti}"]`).forEach(el => el.classList.remove('on'));
      });
      (snap.pattern || []).forEach((row, ti) => {
        row.forEach((on, si) => {
          if (!on) return;
          pattern[ti][si] = true;
          const el = document.querySelector(`.step[data-track="${ti}"][data-step="${si}"]`);
          if (el) el.classList.add('on');
        });
      });

      // Kick states — apply to both kicks
      (snap.kickState || []).forEach((s, idx) => {
        Object.assign(kickState[idx], s);
        // Teardown existing FX chain so it gets rebuilt with new state
        kickFxChains[idx] = null;
      });

      // Restore knob positions for the active kick
      const targetKick = snap.activeKick ?? 0;
      switchToKick(targetKick);

      // Filter knob
      if (snap.filterKnobVal != null) filterKnobRef.set(snap.filterKnobVal);
    }

    function autoSave() {
      try { localStorage.setItem(AUTO_SAVE_KEY, JSON.stringify(captureState())); } catch(e) {}
    }

    // Load autosave on startup
    (function loadAutosave() {
      try {
        const raw = localStorage.getItem(AUTO_SAVE_KEY);
        if (raw) applyState(JSON.parse(raw));
      } catch(e) {}
    })();

    // Named presets
    function loadPresetList() {
      try { return JSON.parse(localStorage.getItem(PRESETS_KEY) || '{}'); } catch(e) { return {}; }
    }
    function savePresetList(list) {
      try { localStorage.setItem(PRESETS_KEY, JSON.stringify(list)); } catch(e) {}
    }

    const presetSelect = document.getElementById('preset-select');
    function refreshPresetSelect(selectName) {
      const list = loadPresetList();
      const names = Object.keys(list).sort();
      presetSelect.innerHTML = '<option value="">— saved presets —</option>';
      names.forEach(n => {
        const opt = document.createElement('option');
        opt.value = opt.textContent = n;
        presetSelect.appendChild(opt);
      });
      if (selectName) presetSelect.value = selectName;
    }
    refreshPresetSelect();
    autoSaveFn = autoSave; // enable auto-save now that everything is wired

    document.getElementById('preset-save-btn').addEventListener('click', () => {
      const name = document.getElementById('preset-name').value.trim();
      if (!name) { document.getElementById('preset-name').focus(); return; }
      const list = loadPresetList();
      list[name] = captureState();
      savePresetList(list);
      refreshPresetSelect(name);
    });

    document.getElementById('preset-load-btn').addEventListener('click', () => {
      const name = presetSelect.value;
      if (!name) return;
      const list = loadPresetList();
      if (list[name]) { applyState(list[name]); autoSave(); }
    });

    document.getElementById('preset-delete-btn').addEventListener('click', () => {
      const name = presetSelect.value;
      if (!name) return;
      const list = loadPresetList();
      delete list[name];
      savePresetList(list);
      refreshPresetSelect();
    });

    // --- Visualizations ---
    const waveformCanvas = document.getElementById('waveform-canvas');
    const compCanvas     = document.getElementById('comp-canvas');
    const wCtx           = waveformCanvas.getContext('2d');
    const cCtx           = compCanvas.getContext('2d');

    function resizeWaveform() {
      waveformCanvas.width  = document.getElementById('waveform-wrap').offsetWidth;
      waveformCanvas.height = 90;
    }
    window.addEventListener('resize', resizeWaveform);
    resizeWaveform();

    const waveformBuf = new Uint8Array(2048);
    function drawWaveform() {
      const w = waveformCanvas.width, h = waveformCanvas.height;
      wCtx.fillStyle = '#0e0e0e';
      wCtx.fillRect(0, 0, w, h);
      wCtx.strokeStyle = '#1c1c1c'; wCtx.lineWidth = 1;
      wCtx.beginPath(); wCtx.moveTo(0, h / 2); wCtx.lineTo(w, h / 2); wCtx.stroke();
      if (!outputAnalyser) return;
      outputAnalyser.getByteTimeDomainData(waveformBuf);
      wCtx.strokeStyle = '#3a9e6e'; wCtx.lineWidth = 1.5;
      wCtx.beginPath();
      const step = w / waveformBuf.length;
      for (let i = 0; i < waveformBuf.length; i++) {
        const y = (waveformBuf[i] / 255) * h;
        i === 0 ? wCtx.moveTo(0, y) : wCtx.lineTo(i * step, y);
      }
      wCtx.stroke();
    }

    const compBuf = new Uint8Array(2048);
    function computeCompOutput(inputDb) {
      const p = kickState[activeKick];
      const thresh = -40 + p.compThresh * 40;
      const ratio  = 2 * Math.pow(10, p.compRatio);
      const knee   = p.compKnee * 8;
      const hk = knee / 2;
      if (knee > 0 && inputDb > thresh - hk && inputDb < thresh + hk) {
        const x = inputDb - thresh + hk;
        return inputDb + (1 / ratio - 1) * x * x / (2 * knee);
      }
      return inputDb < thresh ? inputDb : thresh + (inputDb - thresh) / ratio;
    }

    function drawCompViz() {
      const w = compCanvas.width, h = compCanvas.height;
      const grW = 16, pad = 2, cw = w - grW - pad;
      const minDb = -60, maxDb = 0, dRange = 60;
      const toX = db => (db - minDb) / dRange * cw;
      const toY = db => h - (db - minDb) / dRange * h;

      cCtx.fillStyle = '#0e0e0e'; cCtx.fillRect(0, 0, w, h);

      cCtx.strokeStyle = '#1a1a1a'; cCtx.lineWidth = 1;
      for (let db = -60; db <= 0; db += 10) {
        const x = toX(db), y = toY(db);
        cCtx.beginPath(); cCtx.moveTo(x, 0); cCtx.lineTo(x, h); cCtx.stroke();
        cCtx.beginPath(); cCtx.moveTo(0, y); cCtx.lineTo(cw, y); cCtx.stroke();
      }

      cCtx.fillStyle = '#333'; cCtx.font = '7px monospace'; cCtx.textAlign = 'center';
      [-60, -40, -20, 0].forEach(db => cCtx.fillText(db, toX(db), h - 2));

      cCtx.strokeStyle = '#2a2a2a'; cCtx.setLineDash([3, 3]);
      cCtx.beginPath(); cCtx.moveTo(toX(-60), toY(-60)); cCtx.lineTo(toX(0), toY(0)); cCtx.stroke();
      cCtx.setLineDash([]);

      cCtx.strokeStyle = '#3a9e6e'; cCtx.lineWidth = 1.5;
      cCtx.beginPath();
      for (let px = 0; px < cw; px++) {
        const inDb = minDb + (px / cw) * dRange;
        const outDb = Math.max(minDb, computeCompOutput(inDb));
        px === 0 ? cCtx.moveTo(px, toY(outDb)) : cCtx.lineTo(px, toY(outDb));
      }
      cCtx.stroke();

      const p = kickState[activeKick];
      cCtx.strokeStyle = 'rgba(231,76,60,0.35)'; cCtx.lineWidth = 1; cCtx.setLineDash([2, 3]);
      const tx = toX(-40 + p.compThresh * 40);
      cCtx.beginPath(); cCtx.moveTo(tx, 0); cCtx.lineTo(tx, h); cCtx.stroke();
      cCtx.setLineDash([]);

      // GR meter
      const fx = kickFxChains[activeKick];
      const rawGr = fx ? -fx.comp.reduction : 0;
      const grH = Math.min(rawGr, 24) / 24 * h;
      const grColor = rawGr > 15 ? '#e74c3c' : rawGr > 7 ? '#e67e22' : '#3a9e6e';
      const grX = cw + pad;
      cCtx.fillStyle = '#181818'; cCtx.fillRect(grX, 0, grW, h);
      cCtx.fillStyle = grColor;   cCtx.fillRect(grX, 0, grW, grH);
      [6, 12, 18].forEach(db => { cCtx.fillStyle = '#333'; cCtx.fillRect(grX, (db / 24) * h, grW, 1); });
      cCtx.fillStyle = '#444'; cCtx.font = '7px monospace'; cCtx.textAlign = 'center';
      cCtx.fillText('GR', grX + grW / 2, h - 2);

      // Operating-point dot
      if (fx && outputAnalyser && rawGr > 0.5) {
        outputAnalyser.getByteTimeDomainData(compBuf);
        let peak = 0;
        for (let i = 0; i < compBuf.length; i++) peak = Math.max(peak, Math.abs(compBuf[i] - 128));
        if (peak > 1) {
          const outDb = 20 * Math.log10(peak / 128);
          const inDb  = outDb + rawGr;
          const cx = toX(Math.max(minDb, Math.min(maxDb - 1, inDb)));
          const cy = toY(Math.max(minDb, Math.min(maxDb - 1, computeCompOutput(inDb))));
          cCtx.fillStyle = 'rgba(255,255,255,0.85)';
          cCtx.beginPath(); cCtx.arc(cx, cy, 2.5, 0, Math.PI * 2); cCtx.fill();
        }
      }
    }

    function vizLoop() { drawWaveform(); drawCompViz(); requestAnimationFrame(vizLoop); }
    requestAnimationFrame(vizLoop);
  </script>
</body>
</html>
